# Dependabot Configuration
# version: 1.1.0
# guid: a1b2c3d4-e5f6-7890-abcd-ef1234567890

version: 2

updates:
  # GitHub Actions — keep workflow actions pinned to commit SHAs up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "10:00"
      timezone: America/New_York
    labels:
      - dependencies
      - dependabot
      - github-actions
      - ci-cd
    commit-message:
      prefix: deps
      include: scope

  # Cargo
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "10:00"
      timezone: America/New_York
    labels:
      - dependencies
      - dependabot
      - tech:rust
    commit-message:
      prefix: deps
      include: scope
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

